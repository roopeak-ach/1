<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaji Links</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bahiana&display=swap" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton+SC&family=Bahiana&family=Barriecito&family=Barrio&family=Outfit:wght@100..900&family=Rubik+Dirt&display=swap" rel="stylesheet">



<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    background: url('asligaya.jpg') center center / cover no-repeat;
    position: relative;
}

.overlay {
    position: absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.62);
    z-index: 0;
}

.container {
    position: relative;
    z-index: 1;
    width: 90%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.container img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin-bottom: 15px;
}

.container h2 {
    font-family:'Bahiana', cursive;
    color: rgb(253, 215, 0);
    font-size: 15vw;
    margin-bottom: 0px;
}

.separator {
    width: 50%;
    height: 2px;
    background: white;
    margin: 15px 0;
    border-radius: 1px;
}

.link {
    display: block;
    width: 60%;
    padding: 6px 0px; /* tombol proporsional */
    margin: 6px 0;
    border-radius: 10px;
    text-decoration: none;
    font-family: 'Anton Sc', cursive;
    font-size: 30px; /* font pas, nggak terlalu kecil */
    transition: 0.2s;
    color: white;

    animation: wiggle 3s infinite ease-in-out;
}


.saweria { background: #cc9c00; }
.tiktok { background: #05aeb4; }
.instagram { background: #8914d6; }
.youtube { background: #b60211; }
.facebook { background: #081bbd; }

.saweria:hover { background:#f5dd02; transform: scale(1.05); }
.tiktok:hover { background:#00ffea; transform: scale(1.05); }
.instagram:hover { background:#df3dff; transform: scale(1.05); }
.youtube:hover { background:#ff2b2b; transform: scale(1.05); }
.facebook:hover { background:#00a2ff; transform: scale(1.05); }

.saweria {
    width: 40%; /* lebih kecil dari default 70% */
    color: rgb(255, 255, 255);  /* ganti warna font */
    px 0;  /* lebih ramping */
}

@media (max-width: 480px) {
    body {
        background: url('asligaya-portrait.jpg') center center / cover no-repeat;
    }

    .container h2 { font-size: 20vw; }
    .container img { width: 100px; height: 100px; }
    .separator { width: 50%; }
    .link { font-size: 30px; padding: 8px 0; } /* pas untuk HP */
}

@keyframes wiggle {
    /*0% { transform: translateY(0px) rotate(0deg); }*/
    25% { transform: translateY(-3px); }
    /*50% { transform: translateY(0px) rotate(1deg); }*/
    75% { transform: translateY(3px); }
    /*100% { transform: translateY(0px) rotate(0deg); }*/
}

.saweria { animation-delay: 0s; }
.tiktok { animation-delay: 0.5s; }
.instagram { animation-delay: 1s; }
.youtube { animation-delay: 1.5s; }
.facebook { animation-delay: 2s; }

</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
    <img src="new marsup.jpg" alt="Foto Profil">
    <h2>ROOPEAK</h2>

    <div class="separator"></div>
    <a class="link saweria" href="https://saweria.co/roopeak">Saweria</a>

    <div class="separator"></div>
    <a class="link tiktok" href="https://www.tiktok.com/@roopeak.ach?is_from_webapp=1&sender_device=pc">TikTok</a>
    <a class="link instagram" href="https://www.instagram.com/roopeak.ach?igsh=MTV1cmc5ZDk4NWJxOQ==">Instagram</a>
    <a class="link youtube" href="https://www.youtube.com/@Roopeak.1">YouTube</a>
     <a class="link facebook" href="https://www.facebook.com/profile.php?id=61582713190999&locale=id_ID">Facebook</a>
</div>

</body>
</html>
