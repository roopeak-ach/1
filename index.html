<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roopeak Links</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Bahiana&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Anton+SC&family=Bahiana&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
color:white;
text-align:center;
background:url('asligaya.jpg') center center / cover no-repeat;
position:relative;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.62);
z-index:0;
}

/* UNTUK TAMPILAN GLASS */
.container{
background:rgba(0, 0, 0, 0.35);
backdrop-filter:blur(6px);
padding:20px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.08);
}

.container{
position:relative;
z-index:1;
width:90%;
max-width:400px;
display:flex;
flex-direction:column;
align-items:center;
}

.container img{
width:120px;
height:120px;
border-radius:50%;
margin-bottom:15px;
}

.container h2{
font-family:'Bahiana',cursive;
color:rgb(253,215,0);
font-size:15vw;
margin-bottom:-10px;
}

.separator{
width:50%;
height:2px;
background:white;
margin:15px 0;
border-radius:1px;
}

.link{
display:block;
width:60%;
padding:6px 0;
margin:6px 0;
border-radius:10px;
text-decoration:none;
font-family:'Anton SC',cursive;
font-size:30px;
transition:0.2s;
color:white;
animation:wiggle 2s infinite ease-in-out;
}


.saweria{
background:linear-gradient(135deg,#363636,#111);
border:2px solid #d4af37;
color:#d4af37;
box-shadow:
  inset 0 1px 2px rgba(255,255,255,0.05);
}

.saweria:hover{
background:#d4af37;
color:#000;
border-color:#ffc404;
box-shadow:
  0 0 8px rgba(255,196,4,0.8),
  0 0 16px rgba(255,196,4,0.4);
}


.tiktok{
background:#000;
border:0;
box-shadow:
  2px 3px 0 #FE2C55,
 -2px -3px 0 #25F4EE;
}

.tiktok:hover{
box-shadow:0 0 12px #00f2ea;
}

.instagram{
background: linear-gradient(45deg, #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5);
}
.instagram:hover{
box-shadow:0 0 12px #e45eff;
}
.youtube{background:#FF0000;}
.facebook{background:#076ff7;}

.saweria:hover{background:#f5dd02;transform:scale(1.05);}
.tiktok:hover{background:#00ffea;transform:scale(1.05);}
.instagram:hover{background:#df3dff;transform:scale(1.05);}
.facebook:hover{background:#07abf7;transform:scale(1.05);}
.youtube:hover{background:#ff3737;transform:scale(1.05);}

.youtube:hover{
    box-shadow:0 0 12px #ff5858;
}
.facebook:hover{
  box-shadow:0 0 12px #39c0ff;
}

.saweria{width:40%;}

@media (max-width:480px){

body{
background:url('asligaya-portrait.jpg') center center / cover no-repeat;
}

.container h2{font-size:20vw;}
.container img{width:100px;height:100px;}
.link{font-size:30px;padding:8px 0;}

}

@keyframes wiggle{
25%{transform:translateY(-3px);}
75%{transform:translateY(3px);}
}

.saweria{animation-delay:0s;}
.tiktok{animation-delay:0.5s;}
.instagram{animation-delay:1s;}
.youtube{animation-delay:1.5s;}
.facebook{animation-delay:2s;}


/* COMING SOON MESSAGE */

.comingsoon{
position:fixed;
top:85%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.85);
padding:5px 10px;
border-radius:12px;
font-family:'Arial',cursive;
color:rgb(255, 217, 1);
font-size:22px;
opacity:0;
transition:opacity 0.25s;
pointer-events:none;
z-index:9999;
}

.comingsoon.show{
opacity:1;
}

</style>
</head>

<link rel="icon" href="favicon.ico">
<link rel="apple-touch-icon" href="favicon.ico">

<body>

<div class="overlay"></div>

<div class="container">

<img src="new marsup.jpg" alt="Foto Profil">

<h2>ROOPEAK</h2>

<div class="separator"></div>

<a class="link saweria" href="https://saweria.co/roopeak">Saweria</a>

<div class="separator"></div>

<a class="link tiktok" href="https://www.tiktok.com/@roopeak.ach">TikTok</a>

<a class="link instagram" href="https://www.instagram.com/roopeak.ach">Instagram</a>

<a class="link youtube" href="https://www.youtube.com/@Roopeak.1">YouTube</a>

<a class="link facebook" href="https://www.facebook.com/profile.php?id=61582713190999">Facebook</a>

</div>

<div id="comingsoon" class="comingsoon">
COMING SOON!
</div>

<script>

const disabledButtons=document.querySelectorAll('#');
const msg=document.getElementById('comingsoon');

disabledButtons.forEach(button=>{

button.addEventListener('click',function(e){

e.preventDefault();

/* shake */

this.animate(
[
{transform:'translateX(0)'},
{transform:'translateX(-6px)'},
{transform:'translateX(6px)'},
{transform:'translateX(-6px)'},
{transform:'translateX(6px)'},
{transform:'translateX(0)'}
],
{
duration:400,
iterations:1
}
);

/* show message */

msg.classList.add('show');

setTimeout(()=>{
msg.classList.remove('show');
},1800);

});

});

</script>

</body>
</html>
